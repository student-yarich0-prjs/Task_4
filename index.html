<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Verdana';
        }

        .calculator {
            background: rgb(230, 230, 230);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
        }

        .calculator h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .btn-sum {
            background: #4CAF50;
        }

        .btn-diff {
            background: #FF9800;
        }

        .btn-mult {
            background: #2196F3;
        }

        .btn-div {
            background: #f44336;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            filter: brightness(110%);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-box {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-text {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .error-text {
            color: #f44336;
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <h1>Калькулятор</h1>

        <div class="input-group">
            <label for="num1">Первое число</label>
            <input type="text" id="num1" placeholder="Введите число">
        </div>

        <div class="input-group">
            <label for="num2">Второе число</label>
            <input type="text" id="num2" placeholder="Введите число">
        </div>

        <div class="buttons">
            <button class="btn btn-sum" onclick="calculate('sum')">Сумма</button>
            <button class="btn btn-diff" onclick="calculate('diff')">Разность</button>
            <button class="btn btn-mult" onclick="calculate('mult')">Произведение</button>
            <button class="btn btn-div" onclick="calculate('div')">Деление</button>
        </div>

        <div class="result-box">
            <span id="result" class="result-text"></span>
        </div>
    </div>

    <script>
        function sum(a, b) {
            return a + b;
        }

        function difference(a, b) {
            return a - b;
        }

        function multiplication(a, b) {
            return a * b;
        }

        function division(a, b) {
            if (b === 0) {
                return 'Ошибка: деление на ноль';
            }
            return a / b;
        }

        function calculate(operation) {
            const num1 = document.getElementById('num1').value.trim();
            const num2 = document.getElementById('num2').value.trim();
            const resultElement = document.getElementById('result');

            if (num1 === '' || num2 === '') {
                resultElement.className = 'error-text';
                resultElement.textContent = 'Ошибка: заполните оба поля';
                return;
            }

            if (isNaN(num1) || isNaN(num2)) {
                resultElement.className = 'error-text';
                resultElement.textContent = 'Ошибка: введите только цифры';
                return;
            }

            const number1 = parseFloat(num1);
            const number2 = parseFloat(num2);
            let result;

            switch (operation) {
                case 'sum':
                    result = sum(number1, number2);
                    break;
                case 'diff':
                    result = difference(number1, number2);
                    break;
                case 'mult':
                    result = multiplication(number1, number2);
                    break;
                case 'div':
                    result = division(number1, number2);
                    break;
                default:
                    result = 'Неизвестная операция';
            }

            if (typeof result === 'number') {
                resultElement.className = 'result-text';
                resultElement.textContent = Number.isInteger(result) ? result : result.toFixed(2);
            } else {
                resultElement.className = 'error-text';
                resultElement.textContent = result;
            }
        }
    </script>
</body>

</html>
